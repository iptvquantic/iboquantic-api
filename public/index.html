<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel IPTV</title>
</head>
<body>

<h2>Painel IPTV</h2>

<input id="mac" placeholder="MAC">
<button onclick="buscar()">Buscar</button>
<button onclick="ativar()">Ativar</button>
<button onclick="desativar()">Desativar</button>

<hr>

<h3>Criar Novo Usuário</h3>

<input id="mac_create" placeholder="MAC"><br><br>
<input id="nome" placeholder="Nome"><br><br>
<input id="usuario" placeholder="Usuário"><br><br>
<input id="senha" placeholder="Senha"><br><br>
<input id="dns" placeholder="DNS"><br><br>

<button onclick="criar()">Criar Usuário</button>

<hr>

<pre id="resultado"></pre>

<script>
const API = "https://iboquantic-api-production.up.railway.app";
const KEY = "quantic123seguro";

// 🔍 BUSCAR
async function buscar() {
    const mac = document.getElementById("mac").value;

    const res = await fetch(`${API}/user?mac=${mac}`);
    const data = await res.json();

    document.getElementById("resultado").innerText = JSON.stringify(data, null, 2);
}

// ✅ ATIVAR
async function ativar() {
    const mac = document.getElementById("mac").value;

    const res = await fetch(`${API}/ativar?mac=${mac}`, {
        headers: { "x-api-key": KEY }
    });

    const data = await res.json();
    alert(JSON.stringify(data));
}

// ❌ DESATIVAR
async function desativar() {
    const mac = document.getElementById("mac").value;

    const res = await fetch(`${API}/desativar?mac=${mac}`, {
        headers: { "x-api-key": KEY }
    });

    const data = await res.json();
    alert(JSON.stringify(data));
}

// 🆕 CRIAR USUÁRIO
async function criar() {
    const mac = document.getElementById("mac_create").value;
    const nome = document.getElementById("nome").value;
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;
    const dns = document.getElementById("dns").value;

    const res = await fetch(`${API}/create`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": KEY
        },
        body: JSON.stringify({ mac, nome, usuario, senha, dns })
    });

    const data = await res.json();
    alert(JSON.stringify(data));
}
</script>

</body>
</html>
